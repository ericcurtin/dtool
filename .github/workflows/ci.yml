name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-24.04
            deb_arch: amd64
          - arch: aarch64
            runner: ubuntu-24.04-arm
            deb_arch: arm64

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage binary
        run: cp target/release/dtool dtool-${{ matrix.arch }}-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtool-${{ matrix.arch }}-linux
          path: dtool-${{ matrix.arch }}-linux

      - name: Determine package version
        id: pkg_version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "version=$(echo '${{ github.ref_name }}' | sed 's/^v//')" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0~dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Debian package
        run: |
          PKG=dtool
          VER="${{ steps.pkg_version.outputs.version }}"
          ARCH=${{ matrix.deb_arch }}
          PKGDIR="${PKG}_${VER}_${ARCH}"

          mkdir -p "${PKGDIR}/DEBIAN"
          mkdir -p "${PKGDIR}/usr/bin"

          cp target/release/dtool "${PKGDIR}/usr/bin/dtool"
          chmod 755 "${PKGDIR}/usr/bin/dtool"

          cat > "${PKGDIR}/DEBIAN/control" << EOF
          Package: ${PKG}
          Version: ${VER}
          Architecture: ${ARCH}
          Maintainer: dtool maintainers
          Description: Docker image copy utility
          EOF

          dpkg-deb --build --root-owner-group "${PKGDIR}"

      - name: Upload Debian package artifact
        uses: actions/upload-artifact@v4
        with:
          name: dtool-${{ matrix.arch }}-linux-deb
          path: dtool_${{ steps.pkg_version.outputs.version }}_${{ matrix.deb_arch }}.deb

  release:
    name: Create Release
    # Run on every push to main and on every version tag.  Skip on PRs.
    if: >-
      github.event_name == 'push' && (
        github.ref == 'refs/heads/main' ||
        github.ref_type == 'tag'
      )
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dtool-*
          merge-multiple: true
          path: dist/

      - name: List release assets
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name:       ${{ github.ref_type == 'tag' && github.ref_name || 'Latest build' }}
          prerelease: false
          draft:      false
          generate_release_notes: ${{ github.ref_type == 'tag' }}
          files: dist/*
